<svg width="200" height="200" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Hex tech frame -->
  <polygon points="60,5 105,30 105,90 60,115 15,90 15,30"
           fill="none" stroke="#047857" stroke-width="2" opacity="0.18"/>

  <!-- Network nodes -->
  <circle cx="35" cy="45" r="5" fill="url(#g1)"/>
  <circle cx="75" cy="30" r="5" fill="url(#g1)"/>
  <circle cx="85" cy="75" r="5" fill="url(#g1)"/>
  <circle cx="45" cy="90" r="5" fill="url(#g1)"/>

  <!-- Tech connections -->
  <path d="M35 45 L75 30 L85 75 L45 90 Z"
        fill="none" stroke="url(#g1)" stroke-width="2.5"/>

  <!-- Logistics flow path -->
  <path d="M20 70 C40 40, 70 110, 100 60"
        fill="none" stroke="url(#g2)" stroke-width="4"
        stroke-linecap="round"/>

  <!-- Arrow head -->
  <polygon points="100,60 92,58 96,68"
           fill="#10B981"/>

  <!-- Central hub -->
  <circle cx="60" cy="60" r="6" fill="#34D399"/>
</svg>